version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    open-pull-requests-limit: 5

    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "Europe/Berlin"

    assignees:
      - "flamyamyamy"

    reviewers:
      - "flamyamyamy"

    labels:
      - "dependencies"

    groups:
      npm-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"

    schedule:
      interval: "daily"

    groups:
      actions:
        patterns:
          - "*"
